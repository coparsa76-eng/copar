<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>COPAR – Painel Gerencial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --verde:       #2a5c28;
            --verde-mid:   #3d7a3a;
            --verde-light: #e8f2e7;
            --verde-pale:  #f4f9f3;
            --dourado:     #c8a94a;
            --azul:        #2471a3;
            --laranja:     #ca6f1e;
            --bg:          #f2f5f0;
            --text:        #1a2e19;
            --muted:       #6b7c6a;
            --border:      #dde8db;
            --white:       #ffffff;
            --pago:        #1e8449;
            --pendente:    #c0392b;
            --radius:      14px;
            --shadow:      0 4px 20px rgba(42,92,40,.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: 2rem;
        }

        nav {
            background: var(--verde);
            padding: .85rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 200;
        }
        .nav-brand {
            font-family: 'DM Serif Display', serif;
            color: var(--white); font-size: 1.35rem;
            display: flex; align-items: center; gap: .5rem;
        }
        .nav-right { display: flex; align-items: center; gap: .75rem; }
        .nav-name { color: rgba(255,255,255,.8); font-size: .8rem; }
        .btn-sair {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.3);
            color: var(--white); padding: .4rem .85rem;
            border-radius: 8px; font-size: .82rem; text-decoration: none;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 1.25rem; }

        /* TAB NAVIGATION */
        .tab-nav {
            display: flex;
            gap: .5rem;
            margin-bottom: 1.5rem;
            background: var(--white);
            padding: .5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .tab-btn {
            flex: 1;
            padding: .75rem 1rem;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: .9rem;
            color: var(--muted);
            cursor: pointer;
            border-radius: 10px;
            transition: all .2s;
        }
        .tab-btn.active {
            background: var(--verde);
            color: var(--white);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* STAT CARDS */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: .85rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 600px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 1.1rem;
            border-top: 3px solid var(--verde);
        }
        .stat-card:nth-child(2) { border-top-color: var(--azul); }
        .stat-card:nth-child(3) { border-top-color: var(--dourado); }
        .stat-card:nth-child(4) { border-top-color: var(--laranja); }

        .stat-label {
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: .3rem;
        }
        .stat-val {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
        }

        /* CHARTS */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 640px) { .charts-grid { grid-template-columns: 1fr 1fr; } }

        .chart-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.1rem;
        }
        .chart-card h3 {
            font-size: .9rem;
            font-weight: 700;
            color: var(--verde);
            margin-bottom: .75rem;
        }

        /* SECTIONS */
        .secao {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 1.25rem;
            overflow: hidden;
        }
        .secao-header {
            padding: .8rem 1.1rem;
            background: var(--verde);
            color: var(--white);
            font-weight: 700;
            font-size: .9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .5rem;
        }
        .secao-header-left { display: flex; align-items: center; gap: .5rem; }

        /* FILTER PILLS */
        .filter-pills {
            display: flex;
            gap: .4rem;
            flex-wrap: wrap;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--border);
        }
        .fpill {
            padding: .3rem .85rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
        }
        .fpill.active { background: var(--verde); border-color: var(--verde); color: var(--white); }
        
        .btn-refresh, .btn-print {
            background: none;
            border: 1.5px solid rgba(255,255,255,.4);
            color: var(--white);
            border-radius: 8px;
            padding: .25rem .7rem;
            font-size: .78rem;
            cursor: pointer;
        }

        /* TREE */
        .tree { padding: .75rem 1rem; font-size: .88rem; max-height: 500px; overflow-y: auto; }
        .tree-node { margin: .15rem 0; }
        .tree-toggle {
            cursor: pointer;
            padding: .5rem .6rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: .5rem;
            transition: background .15s;
        }
        .tree-toggle:hover { background: var(--verde-light); }
        .tree-toggle .lbl { flex: 1; font-weight: 600; }
        .badge {
            padding: .15rem .55rem;
            border-radius: 20px;
            font-size: .72rem;
            font-weight: 700;
        }
        .b-kg   { background: #e3f2fd; color: #1565c0; }
        .b-tipo { background: #e8f2e7; color: var(--verde); }
        .b-cls  { background: #fff3e0; color: #e65100; }
        .b-prod { background: #f3e5f5; color: #6a1b9a; }
        .b-hrs  { background: #fef9e7; color: #9c6d00; }

        .tree-children { padding-left: 1.25rem; border-left: 2px solid var(--border); margin-left: .75rem; }
        .tree-leaf {
            padding: .4rem .6rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
        }
        
        /* SEARCH */
        .search-box {
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            padding: .6rem .8rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem;
        }
        
        /* TABLES */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: .84rem; }
        th {
            background: var(--verde-pale);
            color: var(--verde);
            padding: .65rem .85rem;
            text-align: left;
            font-weight: 700;
            font-size: .75rem;
            text-transform: uppercase;
        }
        td {
            padding: .65rem .85rem;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: var(--verde-pale); }
        
        .btn-small {
            background: var(--verde);
            color: white;
            border: none;
            padding: .3rem .7rem;
            border-radius: 6px;
            font-size: .75rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-small:hover { background: var(--verde-mid); }
        
        .vazio { padding: 2rem; text-align: center; color: var(--muted); }
        
        @media print {
            nav, .tab-nav, .btn-refresh, .btn-print, .filter-pills, .btn-small {
                display: none !important;
            }
            body { background: white; padding: 0; margin: 0; }
            .secao { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
            main { max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🌾 COPAR - Gerencial</div>
    <div class="nav-right">
        <span class="nav-name">Luis Henrique</span>
        <a href="/logout" class="btn-sair">Sair</a>
    </div>
</nav>

<main>
    <!-- TABS -->
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
        <button class="tab-btn" data-tab="estoque-local">📦 Estoque por Local</button>
        <button class="tab-btn" data-tab="estoque-produtor">👥 Estoque por Produtor</button>
        <button class="tab-btn" data-tab="relatorios">📄 Relatórios</button>
    </div>

    <!-- TAB DASHBOARD -->
    <div id="tab-dashboard" class="tab-content active">
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">👥 Produtores</div><div class="stat-val" id="statProdutores">--</div></div>
            <div class="stat-card"><div class="stat-label">📦 Estoque (kg)</div><div class="stat-val" id="statEstoque">--</div></div>
            <div class="stat-card"><div class="stat-label">💰 Vendas / Mês</div><div class="stat-val" id="statVendas">--</div></div>
            <div class="stat-card"><div class="stat-label">💸 Pagamentos / Mês</div><div class="stat-val" id="statPagamentos">--</div></div>
        </div>
        <div class="charts-grid">
            <div class="chart-card"><h3>📊 Estoque por Variedade</h3><canvas id="chartTipo" height="180"></canvas></div>
            <div class="chart-card"><h3>📈 Vendas – últimos 6 meses</h3><canvas id="chartVendas" height="180"></canvas></div>
        </div>
        <div class="secao">
            <div class="secao-header"><span>🔄 Últimas Vendas</span></div>
            <div class="table-wrap"><table><thead><tr><th>Data</th><th>Produtor</th><th>Produto</th><th>Peso</th><th>Valor</th></tr></thead><tbody id="vendasTbody"></tbody></table></div>
        </div>
    </div>

    <!-- TAB ESTOQUE POR LOCAL -->
    <div id="tab-estoque-local" class="tab-content">
        <div class="secao">
            <div class="secao-header">
                <span>📦 Estoque por Local</span>
                <button class="btn-refresh" onclick="carregarEstoqueLocal()">🔄</button>
            </div>
            <div class="filter-pills">
                <button class="fpill active" data-filter-local="all">Todos</button>
                <button class="fpill" data-filter-local="Classificação">🏭 Classificação</button>
                <button class="fpill" data-filter-local="Banca">📦 Banca</button>
                <button class="fpill" data-filter-local="Toletagem">✅ Toletagem</button>
            </div>
            <div id="treeEstoqueLocal" class="tree"><div class="vazio">Carregando...</div></div>
        </div>
    </div>

    <!-- TAB ESTOQUE POR PRODUTOR -->
    <div id="tab-estoque-produtor" class="tab-content">
        <div class="secao">
            <div class="secao-header">
                <span>👥 Estoque por Produtor</span>
                <button class="btn-refresh" onclick="carregarEstoqueProdutor()">🔄</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchProdutor" placeholder="🔍 Buscar produtor..." onkeyup="filtrarProdutores()">
            </div>
            <div id="treeEstoqueProdutor" class="tree"><div class="vazio">Carregando...</div></div>
        </div>
    </div>

    <!-- TAB RELATÓRIOS -->
    <div id="tab-relatorios" class="tab-content">
        <div class="secao">
            <div class="secao-header">
                <span>📄 Relatórios</span>
            </div>
            <div style="padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                    <select id="selectProdutorRelatorio" style="flex: 1; padding: .6rem; border-radius: 8px; border: 1px solid var(--border); font-family: inherit;">
                        <option value="">Selecione um produtor...</option>
                    </select>
                    <button class="btn-small" onclick="gerarRelatorioProdutor()" style="padding: .6rem 1.2rem;">📄 Gerar Relatório</button>
                    <button class="btn-small" onclick="window.open('/gerente/relatorio-geral', '_blank')" style="background: var(--dourado);">📊 Relatório Geral</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
let estoqueLocalData = [];
let estoqueProdutorData = [];
let filtroLocalAtivo = 'all';
let chartTipo, chartVendas;

// Helper functions
const fmt = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const fmtN = v => Number(v).toLocaleString('pt-BR');

async function api(url) {
    try { const r = await fetch(url); return await r.json(); }
    catch(e) { console.error(url, e); return null; }
}

// Load produtores for select
async function carregarProdutoresSelect() {
    const data = await api('/api/gerente/estoque-por-produtor');
    if (data) {
        const select = document.getElementById('selectProdutorRelatorio');
        select.innerHTML = '<option value="">Selecione um produtor...</option>' + 
            data.map(p => `<option value="${p.id}">${p.nome} (${p.matricula})</option>`).join('');
    }
}

// Dashboard functions
async function carregarStats() {
    const d = await api('/api/gerente/estatisticas');
    if (!d) return;
    document.getElementById('statProdutores').textContent = d.total_produtores ?? 0;
    document.getElementById('statEstoque').textContent = fmtN(d.total_estoque_kg ?? 0) + ' kg';
    document.getElementById('statVendas').textContent = fmt(d.vendas_mes ?? 0);
    document.getElementById('statPagamentos').textContent = fmt(d.pagamentos_mes ?? 0);
}

async function carregarGraficos() {
    const tipo = await api('/api/gerente/estoque-por-tipo');
    if (tipo) {
        if (chartTipo) chartTipo.destroy();
        chartTipo = new Chart(document.getElementById('chartTipo'), {
            type: 'bar',
            data: { labels: tipo.map(d => d.tipo), datasets: [{ label: 'kg', data: tipo.map(d => d.peso), backgroundColor: '#2a5c28', borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => fmtN(v) + ' kg' } } } }
        });
    }
    const vend = await api('/api/gerente/vendas-por-mes');
    if (vend) {
        if (chartVendas) chartVendas.destroy();
        chartVendas = new Chart(document.getElementById('chartVendas'), {
            type: 'line',
            data: { labels: vend.map(d => d.mes), datasets: [{ label: 'R$', data: vend.map(d => d.total), borderColor: '#ca6f1e', backgroundColor: 'rgba(202,111,30,.12)', fill: true, tension: .3 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.raw) } } }, scales: { y: { ticks: { callback: v => fmt(v) } } } }
        });
    }
}

async function carregarVendas() {
    const vendas = await api('/api/gerente/vendas-recentes?limite=20');
    const tbody = document.getElementById('vendasTbody');
    if (!vendas?.length) { tbody.innerHTML = '<tr><td colspan="6" class="vazio">Nenhuma venda</td></tr>'; return; }
    tbody.innerHTML = vendas.map(v => `<tr><td>${v.data}</td><td>${v.produtor}</td><td>${v.tipo_alho} ${v.classe}</td><td>${fmtN(v.peso)} kg</td><td>${fmt(v.valor_total)}</td></tr>`).join('');
}

// Estoque por Local
async function carregarEstoqueLocal() {
    const container = document.getElementById('treeEstoqueLocal');
    container.innerHTML = '<div class="vazio">Carregando...</div>';
    estoqueLocalData = await api('/api/gerente/estoque-hierarquico') || [];
    renderEstoqueLocal();
}

function renderEstoqueLocal() {
    let dados = filtroLocalAtivo === 'all' ? estoqueLocalData : estoqueLocalData.filter(l => l.local === filtroLocalAtivo);
    if (!dados.length) { document.getElementById('treeEstoqueLocal').innerHTML = '<div class="vazio">Nenhum estoque encontrado</div>'; return; }
    
    function badge(txt, cls) { return `<span class="badge ${cls}">${txt}</span>`; }
    const iconLocal = { 'Classificação': '🏭', 'Banca': '📦', 'Toletagem': '✅' };
    
    let html = '';
    dados.forEach(local => {
        const totalLocal = local.tipos.reduce((s, t) => s + t.classes.reduce((ss, c) => ss + c.total_peso, 0), 0);
        html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">${iconLocal[local.local] || '📁'} ${local.local}</span>${badge(fmtN(totalLocal) + ' kg', 'b-kg')}</div><div class="tree-children" style="display:none">`;
        local.tipos.forEach(tipo => {
            const totalTipo = tipo.classes.reduce((s, c) => s + c.total_peso, 0);
            html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">🧄 ${tipo.tipo}</span>${badge(fmtN(totalTipo) + ' kg', 'b-tipo')}</div><div class="tree-children" style="display:none">`;
            tipo.classes.forEach(cls => {
                html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">${cls.classe}</span>${badge(fmtN(cls.total_peso) + ' kg', 'b-cls')}</div><div class="tree-children" style="display:none">`;
                cls.produtores.forEach(prod => { html += `<div class="tree-leaf">👤 ${prod.produtor} ${badge(fmtN(prod.peso) + ' kg', 'b-prod')}</div>`; });
                html += `</div></div>`;
            });
            html += `</div></div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('treeEstoqueLocal').innerHTML = html;
}

// Estoque por Produtor
async function carregarEstoqueProdutor() {
    const container = document.getElementById('treeEstoqueProdutor');
    container.innerHTML = '<div class="vazio">Carregando...</div>';
    estoqueProdutorData = await api('/api/gerente/estoque-por-produtor') || [];
    renderEstoqueProdutor();
}

function renderEstoqueProdutor(filtro = '') {
    let dados = filtro ? estoqueProdutorData.filter(p => p.nome.toLowerCase().includes(filtro.toLowerCase()) || p.matricula.includes(filtro)) : estoqueProdutorData;
    if (!dados.length) { document.getElementById('treeEstoqueProdutor').innerHTML = '<div class="vazio">Nenhum produtor encontrado</div>'; return; }
    
    function badge(txt, cls) { return `<span class="badge ${cls}">${txt}</span>`; }
    
    let html = '';
    dados.forEach(produtor => {
        const totalProdutor = produtor.locais.reduce((s, l) => s + l.tipos.reduce((ss, t) => ss + t.classes.reduce((sss, c) => sss + c.peso, 0), 0), 0);
        html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">👤 ${produtor.nome} (${produtor.matricula})</span>${badge(fmtN(totalProdutor) + ' kg', 'b-kg')}<button class="btn-small" onclick="event.stopPropagation();gerarRelatorioProdutorEspecifico(${produtor.id})" style="margin-left:auto">📄 Relatório</button></div><div class="tree-children" style="display:none">`;
        produtor.locais.forEach(local => {
            html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">📁 ${local.nome}</span></div><div class="tree-children" style="display:none">`;
            local.tipos.forEach(tipo => {
                html += `<div class="tree-node"><div class="tree-toggle" onclick="toggle(this)"><span>▶</span><span class="lbl">🧄 ${tipo.nome}</span></div><div class="tree-children" style="display:none">`;
                tipo.classes.forEach(cls => {
                    html += `<div class="tree-leaf">${cls.nome} ${badge(fmtN(cls.peso) + ' kg', 'b-cls')}</div>`;
                });
                html += `</div></div>`;
            });
            html += `</div></div>`;
        });
        html += `</div></div>`;
    });
    document.getElementById('treeEstoqueProdutor').innerHTML = html;
}

function filtrarProdutores() {
    const filtro = document.getElementById('searchProdutor').value;
    renderEstoqueProdutor(filtro);
}

function gerarRelatorioProdutorEspecifico(id) {
    window.open(`/gerente/relatorio/${id}`, '_blank');
}

function gerarRelatorioProdutor() {
    const id = document.getElementById('selectProdutorRelatorio').value;
    if (!id) { alert('Selecione um produtor'); return; }
    window.open(`/gerente/relatorio/${id}`, '_blank');
}

// Toggle function
function toggle(el) {
    const ch = el.nextElementSibling;
    if (!ch) return;
    const open = ch.style.display !== 'none';
    ch.style.display = open ? 'none' : 'block';
    el.querySelector('span:first-child').textContent = open ? '▶' : '▼';
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
});

// Filter for local
document.querySelectorAll('[data-filter-local]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter-local]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroLocalAtivo = btn.dataset.filterLocal;
        renderEstoqueLocal();
    });
});

// Initial load
Promise.all([
    carregarStats(),
    carregarGraficos(),
    carregarVendas(),
    carregarEstoqueLocal(),
    carregarEstoqueProdutor(),
    carregarProdutoresSelect()
]);
</script>
</body>
</html>
