<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPAR - Registro de Entrada de Alho</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #e8f0e5 0%, #c8d9bf 100%); min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2c5e2a; border-radius: 16px 16px 0 0; padding: 1.5rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 0.75rem; }
        .header h1::before { content: "🧄"; font-size: 2rem; }
        .header a { background: #e74c3c; color: white; padding: 8px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .header a:hover { background: #c0392b; }
        .content { background: white; border-radius: 0 0 16px 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .registry-area { background: #f8fbf4; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .field-group { display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
        .field-group label { font-weight: 600; color: #2c5e2a; font-size: 0.85rem; text-transform: uppercase; }
        .field-group input, .field-group select { padding: 0.75rem 1rem; border: 2px solid #e2e8d5; border-radius: 10px; font-size: 1rem; }
        .field-group input:focus, .field-group select:focus { outline: none; border-color: #2c5e2a; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .autocomplete-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-item:hover { background: #e8f0e5; }
        .variety-section { background: #fff9ef; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; border-left: 5px solid #e6b422; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .variety-selector { display: flex; align-items: center; gap: 1rem; }
        .variety-selector label { font-weight: 700; color: #b87c2e; }
        .variety-selector select { padding: 0.6rem 1.5rem; border: 2px solid #e6b422; border-radius: 40px; background: white; font-weight: 600; }
        .table-section { margin-bottom: 2rem; overflow-x: auto; }
        .table-section h3 { color: #2c5e2a; margin-bottom: 1rem; }
        .weights-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .weights-table th { background: #eef5e8; padding: 1rem; text-align: center; font-weight: 700; color: #2c5e2a; border-bottom: 2px solid #cde2be; }
        .weights-table th:first-child { text-align: left; }
        .weights-table td { padding: 0.8rem 1rem; text-align: center; border-bottom: 1px solid #eef2e8; }
        .weights-table td:first-child { text-align: left; font-weight: 500; }
        .weights-table input { width: 140px; padding: 0.6rem; text-align: center; border: 1.5px solid #e2e8d5; border-radius: 8px; font-size: 0.95rem; }
        .weights-table input:focus { outline: none; border-color: #2c5e2a; }
        .total-row { background: #f0f7ea; font-weight: 800; }
        .total-row td { font-weight: 800; background: #eef3e7; }
        .extra-fields { background: #eef5e8; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap; align-items: center; }
        .extra-fields .field { display: flex; align-items: center; gap: 1rem; }
        .extra-fields label { font-weight: 600; color: #2c5e2a; }
        .extra-fields input { padding: 0.5rem 1rem; border: 2px solid #cde2be; border-radius: 8px; width: 100px; }
        .action-buttons { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
        .btn { padding: 0.8rem 1.8rem; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #2c5e2a; color: white; }
        .btn-primary:hover { background: #1e461c; transform: translateY(-1px); }
        .btn-secondary { background: #eef2e8; color: #2c5e2a; border: 1px solid #cde2be; }
        .btn-secondary:hover { background: #e2e9d8; }
        .btn-warning { background: #fff3e0; color: #b85c1a; border: 1px solid #ffd9a5; }
        .btn-warning:hover { background: #ffe6cc; }
        .status-message { margin-top: 1rem; padding: 1rem; border-radius: 12px; text-align: center; display: none; }
        .status-message.show { display: block; animation: fadeIn 0.3s; }
        .status-message.success { background: #d4edda; color: #155724; }
        .status-message.error { background: #f8d7da; color: #721c24; }
        .status-message.info { background: #e2e3e5; color: #383d41; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #2c5e2a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .produtor-info { background: #e8f0e5; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; display: none; }
        .produtor-info.show { display: block; }
        @media (max-width: 800px) { .registry-area { grid-template-columns: 1fr; } .content { padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Registro de Entrada - Alho</h1>
        <a href="/logout">Sair</a>
    </div>
    <div class="content">
        <div class="registry-area">
            <div class="field-group">
                <label>🔢 MATRÍCULA DO PRODUTOR</label>
                <input type="text" id="matriculaInput" placeholder="Digite a matrícula (ex: 283)" autocomplete="off">
                <div id="autocompleteList" class="autocomplete-list" style="display: none;"></div>
            </div>
            <div class="field-group">
                <label>👨‍🌾 NOME DO PRODUTOR</label>
                <input type="text" id="produtorInput" readonly placeholder="Aguardando matrícula">
            </div>
            <div class="field-group">
                <label>📅 DATA DO REGISTRO</label>
                <input type="text" id="dataRegistro" readonly>
            </div>
        </div>
        <div id="produtorInfo" class="produtor-info"></div>
        <input type="hidden" id="produtorId">

        <div class="variety-section">
            <div class="variety-selector">
                <label>🌾 VARIEDADE DO ALHO:</label>
                <select id="variedadeSelect">
                    <option value="São Valentim">🍊 São Valentim</option>
                    <option value="Ito">🌿 Ito</option>
                    <option value="Chonan">🧄 Chonan</option>
                </select>
            </div>
            <div class="variety-info">
                ⚡ Todas as classes pertencem à mesma variedade selecionada
            </div>
        </div>

        <div class="variety-section" style="background: #eef5e8; border-left-color: #2c5e2a;">
            <div class="variety-selector">
                <label>📍 LOCAL DE ARMAZENAMENTO:</label>
                <select id="localSelect">
                    <option value="Classificação">🏭 Classificação (Entrada Inicial)</option>
                    <option value="banca">📦 Banca (Classificado)</option>
                    <option value="toletagem">✅ Toletagem (Pronto)</option>
                </select>
            </div>
        </div>

        <!-- Campos adicionais que aparecem conforme o local -->
        <div id="camposAdicionais" style="display: none;">
            <div class="extra-fields">
                <div class="field">
                    <label>⏱️ Horas de Banca:</label>
                    <input type="number" id="horasBanca" step="0.5" value="0" min="0">
                    <span class="info">(R$ <span id="valorHoraDisplay">{{ valor_hora_banca }}</span>/hora)</span>
                </div>
                <div class="field">
                    <label>⚠️ Quebra (kg):</label>
                    <input type="number" id="quebra" step="0.1" value="0" min="0">
                    <span class="info">(peso perdido na movimentação)</span>
                </div>
            </div>
            <div class="extra-fields" style="background: #fff3e0;">
                <div class="field">
                    <label>📌 Origem:</label>
                    <span id="origemInfo">Classificação</span>
                </div>
            </div>
        </div>

        <div class="table-section">
            <h3>📊 Registro de Pesagem por Classe e Tipo</h3>
            <table class="weights-table" id="tabelaAlho">
                <thead><tr><th style="width: 45%;">CLASSE / TIPO</th><th style="width: 55%;">PESO (kg)</th></tr></thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>
        </div>

        <div class="action-buttons">
            <button class="btn btn-warning" id="limparBtn">🗑️ Limpar Todos os Pesos</button>
            <button class="btn btn-secondary" id="exemploBtn">📋 Carregar Exemplo</button>
            <button class="btn btn-primary" id="salvarBtn">💾 Registrar Entrada</button>
        </div>
        <div id="statusMsg" class="status-message"></div>
    </div>
</div>
<script>
    const classesTipos = ["INDÚSTRIA", "TIPO 2", "TIPO 3", "TIPO 4", "TIPO 5", "TIPO 6", "TIPO 7"];
    let dadosTabela = classesTipos.map(classe => ({ classe: classe, peso: null }));
    let produtorAtual = null;
    const tbody = document.getElementById('tabelaCorpo');
    const matriculaInput = document.getElementById('matriculaInput');
    const produtorInput = document.getElementById('produtorInput');
    const produtorIdInput = document.getElementById('produtorId');
    const produtorInfo = document.getElementById('produtorInfo');
    const variedadeSelect = document.getElementById('variedadeSelect');
    const localSelect = document.getElementById('localSelect');
    const limparBtn = document.getElementById('limparBtn');
    const exemploBtn = document.getElementById('exemploBtn');
    const salvarBtn = document.getElementById('salvarBtn');
    const statusMsg = document.getElementById('statusMsg');
    const dataRegistro = document.getElementById('dataRegistro');
    const autocompleteList = document.getElementById('autocompleteList');
    const camposAdicionais = document.getElementById('camposAdicionais');
    const horasBancaInput = document.getElementById('horasBanca');
    const quebraInput = document.getElementById('quebra');
    const origemInfo = document.getElementById('origemInfo');
    let buscaTimeout = null;

    function atualizarCamposAdicionais() {
        const local = localSelect.value;
        if (local === 'Classificação') {
            camposAdicionais.style.display = 'none';
        } else {
            camposAdicionais.style.display = 'block';
            if (local === 'banca') {
                origemInfo.innerText = 'Classificação';
                horasBancaInput.disabled = false;
                document.querySelector('.extra-fields .field:first-child').style.display = 'flex';
            } else if (local === 'toletagem') {
                origemInfo.innerText = 'Banca';
                horasBancaInput.disabled = true;
                horasBancaInput.value = 0;
                document.querySelector('.extra-fields .field:first-child').style.display = 'none';
            }
        }
    }

    function renderizarTabela() {
        tbody.innerHTML = '';
        dadosTabela.forEach((item, index) => {
            const tr = document.createElement('tr');
            const tdClasse = document.createElement('td');
            let icone = item.classe === "INDÚSTRIA" ? '🏭 ' : '🔢 ';
            tdClasse.innerHTML = icone + item.classe;
            tr.appendChild(tdClasse);
            const tdPeso = document.createElement('td');
            const pesoInput = document.createElement('input');
            pesoInput.type = 'number';
            pesoInput.step = '1';
            pesoInput.value = item.peso !== null ? item.peso : '';
            pesoInput.placeholder = '0 kg';
            pesoInput.addEventListener('change', (e) => {
                let valor = e.target.value;
                if (valor === '') dadosTabela[index].peso = null;
                else { let num = parseFloat(valor); if (!isNaN(num) && num >= 0) dadosTabela[index].peso = Math.round(num); else dadosTabela[index].peso = null; }
                renderizarTabela();
            });
            tdPeso.appendChild(pesoInput);
            tr.appendChild(tdPeso);
            tbody.appendChild(tr);
        });
        const trTotal = document.createElement('tr');
        trTotal.classList.add('total-row');
        const tdTotalLabel = document.createElement('td');
        tdTotalLabel.innerHTML = '<strong>🔹 TOTAL GERAL</strong>';
        trTotal.appendChild(tdTotalLabel);
        const tdTotalValor = document.createElement('td');
        const totalValor = dadosTabela.reduce((s,i)=>s+(i.peso||0),0);
        const totalInput = document.createElement('input');
        totalInput.type = 'text';
        totalInput.value = totalValor > 0 ? totalValor.toLocaleString('pt-BR') + ' kg' : '0 kg';
        totalInput.disabled = true;
        totalInput.style.background = '#eef3e7';
        totalInput.style.fontWeight = 'bold';
        totalInput.style.textAlign = 'center';
        totalInput.style.border = 'none';
        tdTotalValor.appendChild(totalInput);
        trTotal.appendChild(tdTotalValor);
        tbody.appendChild(trTotal);
    }

    function limparTodosPesos() {
        dadosTabela.forEach(i=>i.peso=null);
        renderizarTabela();
        mostrarStatus("✅ Todos os campos de peso foram limpos.", "success");
    }

    function carregarExemplo() {
        const variedade = variedadeSelect.value;
        let ex = {};
        if(variedade === 'São Valentim') ex = { "INDÚSTRIA":850, "TIPO 2":512, "TIPO 3":870, "TIPO 4":1269, "TIPO 5":579, "TIPO 6":199, "TIPO 7":45 };
        else if(variedade === 'Ito') ex = { "INDÚSTRIA":1200, "TIPO 2":780, "TIPO 3":1250, "TIPO 4":890, "TIPO 5":445, "TIPO 6":267, "TIPO 7":89 };
        else ex = { "INDÚSTRIA":950, "TIPO 2":650, "TIPO 3":980, "TIPO 4":1540, "TIPO 5":720, "TIPO 6":310, "TIPO 7":125 };
        dadosTabela.forEach(i=>{ if(ex[i.classe]!==undefined) i.peso = ex[i.classe]; });
        renderizarTabela();
        mostrarStatus(`📋 Exemplo carregado para variedade ${variedade}!`, "info");
    }

    async function buscarProdutoresPorTermo(termo) {
        if(termo.length<1) return [];
        try{
            const resp = await fetch(`/api/buscar-produtores?termo=${encodeURIComponent(termo)}`);
            return await resp.json();
        } catch(e){ return []; }
    }

    function mostrarAutocomplete(produtores) {
        if(!produtores.length){ autocompleteList.style.display='none'; return; }
        autocompleteList.innerHTML='';
        produtores.forEach(p=>{
            const div = document.createElement('div');
            div.className='autocomplete-item';
            div.innerHTML=`<strong>${p.matricula}</strong> - ${p.nome}`;
            div.onclick=()=>selecionarProdutor(p);
            autocompleteList.appendChild(div);
        });
        const rect = matriculaInput.getBoundingClientRect();
        autocompleteList.style.position='absolute';
        autocompleteList.style.top=rect.bottom+'px';
        autocompleteList.style.left=rect.left+'px';
        autocompleteList.style.width=rect.width+'px';
        autocompleteList.style.display='block';
    }

    function selecionarProdutor(produtor) {
        matriculaInput.value = produtor.matricula;
        produtorInput.value = produtor.nome;
        produtorIdInput.value = produtor.id;
        produtorAtual = produtor;
        autocompleteList.style.display='none';
        produtorInfo.innerHTML = `✅ Produtor selecionado: <strong>${produtor.nome}</strong> (Matrícula: ${produtor.matricula})`;
        produtorInfo.classList.add('show');
        mostrarStatus(`✅ Produtor encontrado: ${produtor.nome}`, "success");
        setTimeout(()=>produtorInfo.classList.remove('show'),3000);
    }

    matriculaInput.addEventListener('input', async (e) => {
        const termo = e.target.value.trim();
        if(termo.length===0){ autocompleteList.style.display='none'; produtorInput.value=''; produtorIdInput.value=''; produtorAtual=null; produtorInfo.classList.remove('show'); return; }
        if(buscaTimeout) clearTimeout(buscaTimeout);
        buscaTimeout = setTimeout(async ()=>{
            const produtores = await buscarProdutoresPorTermo(termo);
            mostrarAutocomplete(produtores);
        },300);
    });
    matriculaInput.addEventListener('blur', ()=>{ setTimeout(()=>{ if(!autocompleteList.matches(':hover')) autocompleteList.style.display='none'; },200); });
    localSelect.addEventListener('change', atualizarCamposAdicionais);

    async function salvarRegistro() {
        const produtorId = produtorIdInput.value;
        const produtorNome = produtorInput.value.trim();
        const variedade = variedadeSelect.value;
        const local = localSelect.value;
        const horasBanca = parseFloat(horasBancaInput.value) || 0;
        const quebra = parseFloat(quebraInput.value) || 0;

        if(!produtorId || !produtorNome){
            mostrarStatus("❌ Informe uma matrícula válida de produtor! Digite a matrícula e selecione um produtor da lista.", "error");
            matriculaInput.focus();
            return;
        }
        const detalhes = [];
        let pesoTotal = 0;
        dadosTabela.forEach(item=>{
            if(item.peso && item.peso>0){
                detalhes.push({classe: item.classe, peso: item.peso});
                pesoTotal += item.peso;
            }
        });
        if(detalhes.length===0){
            mostrarStatus("⚠️ Nenhum peso foi preenchido! Preencha pelo menos uma classe.", "error");
            return;
        }
        // Validação de quebra não pode ser maior que o peso total
        if(quebra > pesoTotal){
            mostrarStatus(`⚠️ Quebra (${quebra} kg) não pode ser maior que o peso total (${pesoTotal} kg).`, "error");
            return;
        }
        let mensagemConfirmacao = `Confirmar entrada:\n\nProdutor: ${produtorNome}\nVariedade: ${variedade}\nLocal: ${local === 'Classificação' ? 'Classificação' : local === 'banca' ? 'Banca' : 'Toletagem'}\nTotal movido: ${pesoTotal} Kg`;
        if(local !== 'Classificação'){
            mensagemConfirmacao += `\nOrigem: ${local === 'banca' ? 'Classificação' : 'Banca'}`;
            if(local === 'banca') mensagemConfirmacao += `\nHoras de Banca: ${horasBanca}`;
            if(quebra > 0) mensagemConfirmacao += `\n⚠️ Quebra: ${quebra} Kg`;
        }
        mensagemConfirmacao += `\n\nDeseja registrar?`;
        if(!confirm(mensagemConfirmacao)) return;

        salvarBtn.disabled=true;
        salvarBtn.innerHTML='<span class="loading"></span> Salvando...';
        try{
            const resp = await fetch('/api/salvar-entrada',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    produtor_id:parseInt(produtorId),
                    tipo_alho:variedade,
                    local:local,
                    detalhes:detalhes,
                    horas_banca:horasBanca,
                    quebra:quebra
                })
            });
            const result = await resp.json();
            if(result.sucesso){
                mostrarStatus(`✅ ${result.mensagem}`, "success");
                limparTodosPesos();
                horasBancaInput.value = 0;
                quebraInput.value = 0;
                setTimeout(()=>{ if(confirm("Entrada registrada com sucesso! Deseja registrar outra entrada?")){ matriculaInput.focus(); matriculaInput.select(); } },500);
            } else {
                mostrarStatus(`❌ ${result.mensagem}`, "error");
            }
        } catch(e){
            mostrarStatus(`❌ Erro ao salvar: ${e.message}`, "error");
        } finally {
            salvarBtn.disabled=false;
            salvarBtn.innerHTML='💾 Registrar Entrada';
        }
    }

    function mostrarStatus(msg, tipo){
        statusMsg.textContent=msg;
        statusMsg.className=`status-message show ${tipo}`;
        setTimeout(()=>statusMsg.classList.remove('show'),5000);
    }
    function atualizarDataAtual(){
        const agora = new Date();
        dataRegistro.value = agora.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    function init(){
        renderizarTabela();
        atualizarDataAtual();
        setInterval(atualizarDataAtual,60000);
        limparBtn.onclick=limparTodosPesos;
        exemploBtn.onclick=carregarExemplo;
        salvarBtn.onclick=salvarRegistro;
        atualizarCamposAdicionais();
        mostrarStatus("📝 Formulário pronto. Digite a matrícula do produtor (ex: 283) e selecione da lista.", "info");
    }
    init();
</script>
</body>
</html>
