<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>COPAR –
        {% if role == 'classificacao' %}Entrada na Classificação
        {% elif role == 'banca' %}Transferência para Banca
        {% else %}Transferência para Toletagem{% endif %}
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --verde:       #2a5c28;
            --verde-mid:   #3d7a3a;
            --verde-light: #e8f2e7;
            --verde-pale:  #f4f9f3;
            --dourado:     #c8a94a;
            --bg:          #f2f5f0;
            --text:        #1a2e19;
            --muted:       #6b7c6a;
            --border:      #dde8db;
            --white:       #ffffff;
            --danger:      #c0392b;
            --warning:     #e67e22;
            --radius:      12px;
            --shadow:      0 4px 20px rgba(42,92,40,.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: 5rem;
        }

        /* NAV */
        nav {
            background: var(--verde);
            padding: .85rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .nav-brand {
            font-family: 'DM Serif Display', serif;
            color: var(--white);
            font-size: 1.2rem;
        }
        .nav-title {
            color: rgba(255,255,255,.8);
            font-size: .78rem;
            margin-top: .1rem;
        }
        .btn-sair {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.3);
            color: var(--white);
            padding: .4rem .85rem;
            border-radius: 8px;
            font-size: .82rem;
            text-decoration: none;
        }

        main { max-width: 700px; margin: 0 auto; padding: 1rem; }

        /* CARD GENÉRICO */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            overflow: visible;
        }
        .card-header {
            padding: .85rem 1.1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: .9rem;
            color: var(--verde);
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .card-body { padding: 1rem 1.1rem; }

        /* PRODUTOR */
        .produtor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }
        @media (max-width: 480px) { .produtor-grid { grid-template-columns: 1fr; } }

        .field { display: flex; flex-direction: column; gap: .3rem; }
        .field label {
            font-size: .75rem;
            font-weight: 600;
            color: var(--verde);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .field input, .field select {
            padding: .75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            color: var(--text);
            background: var(--verde-pale);
            transition: border .2s;
            -webkit-appearance: none;
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--verde);
            box-shadow: 0 0 0 3px rgba(42,92,40,.1);
        }
        .field input[readonly] {
            background: #f0f0f0;
            color: var(--muted);
        }
        .field-full { grid-column: 1 / -1; }

        /* AUTOCOMPLETE */
        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: var(--white);
            border: 1.5px solid var(--verde);
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
            max-height: 220px;
            overflow-y: auto;
            z-index: 500;
            display: none;
        }
        .autocomplete-item {
            padding: .75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: .9rem;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item:active { background: var(--verde-light); }
        .autocomplete-item strong { color: var(--verde); }

        /* BANNER PRODUTOR SELECIONADO */
        .produtor-banner {
            background: var(--verde-light);
            border: 1.5px solid #b8d9b5;
            border-radius: 10px;
            padding: .65rem 1rem;
            font-size: .88rem;
            color: var(--verde);
            font-weight: 600;
            margin-top: .5rem;
            display: none;
            align-items: center;
            gap: .5rem;
        }
        .produtor-banner.show { display: flex; }

        /* VARIEDADE PILLS */
        .pills { display: flex; gap: .5rem; flex-wrap: wrap; }
        .pill {
            padding: .55rem 1.1rem;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: .88rem;
            cursor: pointer;
            transition: all .2s;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        .pill.active {
            background: var(--verde);
            border-color: var(--verde);
            color: var(--white);
        }

        /* CAMPOS EXTRAS */
        .extras-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }
        @media (max-width: 480px) { .extras-grid { grid-template-columns: 1fr; } }

        .saldo-tag {
            font-size: .75rem;
            color: var(--verde-mid);
            margin-top: .25rem;
            font-weight: 500;
        }

        /* TABELA PESAGEM */
        .peso-list { display: flex; flex-direction: column; gap: .5rem; }
        .peso-row {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .6rem .85rem;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--verde-pale);
            transition: border-color .2s;
        }
        .peso-row:focus-within { border-color: var(--verde); }
        .peso-row.excede { border-color: var(--danger); background: #fef0ef; }

        .peso-classe {
            flex: 1;
            font-size: .9rem;
            font-weight: 600;
            min-width: 0;
        }
        .peso-saldo {
            font-size: .72rem;
            color: var(--muted);
            white-space: nowrap;
        }
        .peso-input {
            width: 110px;
            padding: .55rem .75rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem;
            text-align: right;
            background: var(--white);
            color: var(--text);
            -webkit-appearance: none;
            flex-shrink: 0;
        }
        .peso-input:focus { outline: none; border-color: var(--verde); }

        .total-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem .85rem;
            background: var(--verde-light);
            border-radius: 10px;
            border: 2px solid #b8d9b5;
            font-weight: 700;
            font-size: 1rem;
            margin-top: .25rem;
        }

        /* BOTÕES */
        .botoes {
            position: sticky;
            bottom: 0;
            background: rgba(242,245,240,.95);
            backdrop-filter: blur(8px);
            padding: .85rem 1rem;
            display: flex;
            gap: .6rem;
            border-top: 1px solid var(--border);
        }
        .btn {
            flex: 1;
            padding: .85rem .5rem;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--verde); color: var(--white); }
        .btn-secondary { background: var(--verde-light); color: var(--verde); border: 1.5px solid #b8d9b5; }
        .btn-danger  { background: #fdecea; color: var(--danger); border: 1.5px solid #f5c6c2; }
        .btn:disabled { opacity: .55; }

        /* STATUS */
        .status-bar {
            margin: 0 1rem;
            padding: .85rem 1rem;
            border-radius: var(--radius);
            font-size: .88rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: .5rem;
            animation: slideIn .25s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
        .status-bar.show { display: flex; }
        .status-bar.success { background: #d5f0de; color: #1a6b35; }
        .status-bar.error   { background: #fdecea; color: var(--danger); }
        .status-bar.info    { background: #e3ecf7; color: #1a5276; }
        .status-bar.warning { background: #fef5e7; color: #7d5a00; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<nav>
    <div>
        <div class="nav-brand">🌾 COPAR</div>
        <div class="nav-title">
            {% if role == 'classificacao' %}🏭 Entrada – Classificação
            {% elif role == 'banca' %}📦 Transferência – Banca
            {% else %}✅ Transferência – Toletagem{% endif %}
        </div>
    </div>
    <a href="/logout" class="btn-sair">Sair</a>
</nav>

<!-- STATUS (fica abaixo do nav) -->
<div style="max-width:700px;margin:.75rem auto 0;padding:0 1rem;">
    <div id="statusMsg" class="status-bar" style="margin:0;"></div>
</div>

<main>
    <!-- PRODUTOR -->
    <div class="card">
        <div class="card-header">👤 Produtor</div>
        <div class="card-body">
            <div class="produtor-grid">
                <div class="field autocomplete-wrap">
                    <label>Matrícula</label>
                    <input type="text" id="matriculaInput" placeholder="Buscar por matrícula ou nome"
                        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
                    <div id="autocompleteList" class="autocomplete-list"></div>
                </div>
                <div class="field">
                    <label>Nome</label>
                    <input type="text" id="produtorInput" readonly placeholder="—">
                </div>
                <div class="field">
                    <label>📅 Data</label>
                    <input type="text" id="dataRegistro" readonly>
                </div>
            </div>
            <div id="produtorBanner" class="produtor-banner"></div>
            <input type="hidden" id="produtorId">
        </div>
    </div>

    <!-- VARIEDADE -->
    <div class="card">
        <div class="card-header">🌾 Variedade do Alho</div>
        <div class="card-body">
            <div class="pills" id="variedadePills">
                <button class="pill active" data-value="São Valentim">🍊 São Valentim</button>
                <button class="pill" data-value="Ito">🌿 Ito</button>
                <button class="pill" data-value="Chonan">🧄 Chonan</button>
            </div>
        </div>
    </div>

    <!-- CAMPOS EXTRAS (banca / toletagem) -->
    {% if role != 'classificacao' %}
    <div class="card">
        <div class="card-header">⚙️ Movimentação</div>
        <div class="card-body">
            <div class="extras-grid">
                <div class="field">
                    <label>📌 Origem</label>
                    <select id="origemSelect">
                        {% if role == 'banca' %}
                        <option value="Classificação">Classificação</option>
                        <option value="Toletagem">Toletagem</option>
                        {% else %}
                        <option value="Classificação">Classificação</option>
                        <option value="Banca">Banca</option>
                        {% endif %}
                    </select>
                    <div id="saldoOrigemTag" class="saldo-tag"></div>
                </div>
                <div class="field">
                    <label>⏱️ Horas de Banca</label>
                    <input type="number" id="horasBanca" step="0.5" value="0" min="0">
                </div>
                <div class="field">
                    <label>⚠️ Quebra (kg)</label>
                    <input type="number" id="quebra" step="0.1" value="0" min="0">
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    <!-- TABELA PESOS -->
    <div class="card">
        <div class="card-header">⚖️ Pesos por Classe</div>
        <div class="card-body">
            <div class="peso-list" id="pesoList"></div>
        </div>
    </div>
</main>

<!-- BOTÕES STICKY -->
<div class="botoes">
    <button class="btn btn-danger" id="limparBtn">🗑️ Limpar</button>
    <button class="btn btn-secondary" id="exemploBtn">📋 Exemplo</button>
    <button class="btn btn-primary" id="salvarBtn">💾 Registrar</button>
</div>

<!-- HIDDEN -->
<input type="hidden" id="localDestino" value="{{ 'Classificação' if role == 'classificacao' else 'banca' if role == 'banca' else 'toletagem' }}">

<script>
const ROLE = "{{ role }}";
const VALOR_HORA = {{ valor_hora_banca }};
const CLASSES = ["INDÚSTRIA","TIPO 2","TIPO 3","TIPO 4","TIPO 5","TIPO 6","TIPO 7"];
const CLASSE_MAP = {
    "INDÚSTRIA":"Indústria","TIPO 2":"Classe 2","TIPO 3":"Classe 3",
    "TIPO 4":"Classe 4","TIPO 5":"Classe 5","TIPO 6":"Classe 6","TIPO 7":"Classe 7"
};

let pesos = Object.fromEntries(CLASSES.map(c => [c, '']));
let saldos = {};
let produtorAtual = null;
let buscaTimeout = null;

// ─── ELEMENTOS ───────────────────────────────────────
const $ = id => document.getElementById(id);
const matriculaInput  = $('matriculaInput');
const produtorInput   = $('produtorInput');
const produtorIdInput = $('produtorId');
const produtorBanner  = $('produtorBanner');
const autocompleteList= $('autocompleteList');
const dataRegistro    = $('dataRegistro');
const pesoList        = $('pesoList');
const statusMsg       = $('statusMsg');
const localDestino    = $('localDestino');
const origemSelect    = ROLE !== 'classificacao' ? $('origemSelect') : null;
const horasInput      = ROLE !== 'classificacao' ? $('horasBanca') : null;
const quebraInput     = ROLE !== 'classificacao' ? $('quebra') : null;
const saldoTag        = $('saldoOrigemTag');

// ─── STATUS ───────────────────────────────────────────
function showStatus(msg, tipo, duração = 5000) {
    statusMsg.textContent = msg;
    statusMsg.className = `status-bar show ${tipo}`;
    clearTimeout(statusMsg._t);
    statusMsg._t = setTimeout(() => statusMsg.classList.remove('show'), duração);
}

// ─── DATA ─────────────────────────────────────────────
function atualizarData() {
    dataRegistro.value = new Date().toLocaleString('pt-BR',
        {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ─── VARIEDADE PILLS ──────────────────────────────────
let variedade = 'São Valentim';
document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        variedade = p.dataset.value;
        if (ROLE !== 'classificacao' && produtorIdInput.value) atualizarSaldos();
    });
});

// ─── AUTOCOMPLETE ─────────────────────────────────────
matriculaInput.addEventListener('input', e => {
    const t = e.target.value.trim();
    if (!t) { autocompleteList.style.display='none'; limparProdutor(); return; }
    clearTimeout(buscaTimeout);
    buscaTimeout = setTimeout(async () => {
        const lista = await fetchJSON(`/api/buscar-produtores?termo=${encodeURIComponent(t)}`);
        renderAutocomplete(lista || []);
    }, 280);
});

matriculaInput.addEventListener('blur', () => {
    setTimeout(() => { autocompleteList.style.display = 'none'; }, 200);
});

function renderAutocomplete(lista) {
    if (!lista.length) { autocompleteList.style.display='none'; return; }
    autocompleteList.innerHTML = lista.map(p =>
        `<div class="autocomplete-item" data-id="${p.id}" data-mat="${p.matricula}" data-nome="${p.nome}">
            <strong>${p.matricula}</strong> – ${p.nome}
         </div>`
    ).join('');
    autocompleteList.style.display = 'block';
    autocompleteList.querySelectorAll('.autocomplete-item').forEach(el => {
        el.addEventListener('mousedown', () => selecionarProdutor({
            id: el.dataset.id, matricula: el.dataset.mat, nome: el.dataset.nome
        }));
    });
}

function selecionarProdutor(p) {
    matriculaInput.value = p.matricula;
    produtorInput.value  = p.nome;
    produtorIdInput.value = p.id;
    produtorAtual = p;
    autocompleteList.style.display = 'none';
    produtorBanner.innerHTML = `✅ <strong>${p.nome}</strong> (Matrícula: ${p.matricula})`;
    produtorBanner.classList.add('show');
    setTimeout(() => produtorBanner.classList.remove('show'), 3000);
    showStatus(`✅ Produtor selecionado: ${p.nome}`, 'success', 3000);
    if (ROLE !== 'classificacao') atualizarSaldos();
}

function limparProdutor() {
    produtorInput.value = '';
    produtorIdInput.value = '';
    produtorAtual = null;
    produtorBanner.classList.remove('show');
}

// ─── SALDOS ───────────────────────────────────────────
async function atualizarSaldos() {
    const pid = produtorIdInput.value;
    const origem = origemSelect?.value;
    if (!pid || !origem) return;

    saldos = {};
    let total = 0;

    for (const classe of CLASSES) {
        const classeBanco = CLASSE_MAP[classe];
        const data = await fetchJSON('/api/obter-saldo', 'POST', {
            produtor_id: parseInt(pid), tipo_alho: variedade, classe: classeBanco, local: origem
        });
        if (data?.sucesso) { saldos[classe] = data.saldo; total += data.saldo; }
    }

    if (saldoTag) saldoTag.textContent = `Disponível em ${origem}: ${total.toLocaleString('pt-BR')} kg`;
    renderPesos();
}

if (origemSelect) {
    origemSelect.addEventListener('change', () => {
        if (produtorIdInput.value) atualizarSaldos();
    });
}

// ─── RENDER PESOS ─────────────────────────────────────
function renderPesos() {
    pesoList.innerHTML = '';
    CLASSES.forEach(c => {
        const saldo = saldos[c] ?? null;
        const val   = pesos[c];
        const excede = saldo !== null && val !== '' && parseFloat(val) > saldo;
        const row = document.createElement('div');
        row.className = `peso-row${excede ? ' excede' : ''}`;
        row.innerHTML = `
            <div class="peso-classe">
                ${c}
                ${saldo !== null ? `<div class="peso-saldo">disp: ${saldo.toLocaleString('pt-BR')} kg</div>` : ''}
            </div>
            <input class="peso-input" type="number" inputmode="decimal"
                step="1" min="0" placeholder="0"
                value="${val}" data-classe="${c}">
        `;
        row.querySelector('input').addEventListener('change', e => {
            const v = e.target.value;
            pesos[c] = v === '' ? '' : String(Math.max(0, Math.round(parseFloat(v) || 0)));
            e.target.value = pesos[c];
            renderPesos();
        });
        pesoList.appendChild(row);
    });

    // Total
    const total = CLASSES.reduce((s,c) => s + (parseFloat(pesos[c]) || 0), 0);
    const div = document.createElement('div');
    div.className = 'total-row';
    div.innerHTML = `<span>🔹 TOTAL GERAL</span><span>${total.toLocaleString('pt-BR')} kg</span>`;
    pesoList.appendChild(div);
}

// ─── LIMPAR ───────────────────────────────────────────
function limpar() {
    pesos = Object.fromEntries(CLASSES.map(c => [c, '']));
    renderPesos();
    showStatus('✅ Pesos limpos.', 'success', 2500);
}

// ─── EXEMPLO ──────────────────────────────────────────
function carregarExemplo() {
    const ex = {
        'São Valentim': {INDÚSTRIA:850,'TIPO 2':512,'TIPO 3':870,'TIPO 4':1269,'TIPO 5':579,'TIPO 6':199,'TIPO 7':45},
        'Ito':          {INDÚSTRIA:1200,'TIPO 2':780,'TIPO 3':1250,'TIPO 4':890,'TIPO 5':445,'TIPO 6':267,'TIPO 7':89},
        'Chonan':       {INDÚSTRIA:950,'TIPO 2':650,'TIPO 3':980,'TIPO 4':1540,'TIPO 5':720,'TIPO 6':310,'TIPO 7':125}
    }[variedade] || {};
    CLASSES.forEach(c => { if (ex[c] !== undefined) pesos[c] = String(ex[c]); });
    renderPesos();
    showStatus(`📋 Exemplo ${variedade} carregado.`, 'info', 2500);
}

// ─── SALVAR ───────────────────────────────────────────
async function salvar() {
    const pid    = produtorIdInput.value;
    const pnome  = produtorInput.value.trim();
    const local  = localDestino.value;
    const origem = origemSelect?.value ?? null;
    const horas  = parseFloat(horasInput?.value) || 0;
    const quebra = parseFloat(quebraInput?.value) || 0;

    if (!pid || !pnome) {
        showStatus('❌ Selecione um produtor na lista.', 'error'); return;
    }
    if (ROLE !== 'classificacao' && !origem) {
        showStatus('❌ Selecione a origem do estoque.', 'error'); return;
    }

    const detalhes = [];
    let totalPeso = 0;
    let temExcesso = false;

    for (const c of CLASSES) {
        const p = parseFloat(pesos[c]) || 0;
        if (p <= 0) continue;
        if (ROLE !== 'classificacao' && saldos[c] !== undefined && p > saldos[c]) {
            showStatus(`❌ ${c}: peso (${p} kg) excede saldo (${saldos[c]} kg).`, 'error');
            temExcesso = true; break;
        }
        detalhes.push({ classe: c, peso: p });
        totalPeso += p;
    }

    if (temExcesso) return;
    if (!detalhes.length) { showStatus('⚠️ Preencha pelo menos um peso.', 'warning'); return; }
    if (quebra > totalPeso) { showStatus(`⚠️ Quebra (${quebra} kg) maior que total (${totalPeso} kg).`, 'warning'); return; }

    const destLabel = local === 'Classificação' ? 'Classificação' : local === 'banca' ? 'Banca' : 'Toletagem';
    let conf = `Confirmar ${ROLE === 'classificacao' ? 'entrada' : 'transferência'}?\n\nProdutor: ${pnome}\nVariedade: ${variedade}\nDestino: ${destLabel}\nTotal: ${totalPeso} kg`;
    if (ROLE !== 'classificacao') conf += `\nOrigem: ${origem}`;
    if (horas > 0) conf += `\nHoras banca: ${horas}`;
    if (quebra > 0) conf += `\nQuebra: ${quebra} kg`;
    if (!confirm(conf)) return;

    const btn = $('salvarBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Salvando…';

    const result = await fetchJSON('/api/salvar-entrada', 'POST', {
        produtor_id: parseInt(pid), tipo_alho: variedade, local,
        local_origem: origem, detalhes, horas_banca: horas, quebra
    });

    btn.disabled = false;
    btn.innerHTML = '💾 Registrar';

    if (result?.sucesso) {
        showStatus(`✅ ${result.mensagem}`, 'success', 6000);
        limpar();
        if (horasInput) horasInput.value = 0;
        if (quebraInput) quebraInput.value = 0;
        setTimeout(() => {
            if (confirm('Registro salvo! Registrar outro?')) {
                matriculaInput.focus(); matriculaInput.select();
            }
        }, 600);
    } else {
        showStatus(`❌ ${result?.mensagem || 'Erro ao salvar.'}`, 'error');
    }
}

// ─── FETCH HELPER ─────────────────────────────────────
async function fetchJSON(url, method = 'GET', body = null) {
    try {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(url, opts);
        return await r.json();
    } catch (e) { console.error(e); return null; }
}

// ─── INIT ─────────────────────────────────────────────
function init() {
    renderPesos();
    atualizarData();
    setInterval(atualizarData, 60000);
    $('limparBtn').onclick = limpar;
    $('exemploBtn').onclick = carregarExemplo;
    $('salvarBtn').onclick = salvar;
    showStatus('📝 Digite a matrícula e selecione o produtor.', 'info', 4000);
}
init();
</script>
