<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Entrada</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

.linha {
    display: grid;
    grid-template-columns: 1fr 100px 120px;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
}

input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    text-align: center;
}

.grp {
    display: flex;
    gap: 4px;
}

button {
    padding: 6px;
    border: none;
    background: #2a5c28;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Registro</h2>

<select id="tipo_alho">
<option value="São Valentim">São Valentim</option>
<option value="Ito">Ito</option>
<option value="Chonan">Chonan</option>
</select>

<div id="classes"></div>

<button onclick="salvar()">Salvar</button>
</div>

<script>
const CLASSES = ["INDÚSTRIA","TIPO 2","TIPO 3","TIPO 4","TIPO 5","TIPO 6","TIPO 7"];

function render(){
    const c = document.getElementById('classes');
    c.innerHTML = CLASSES.map((cls,i)=>`
        <div class="linha">
            <div>${cls}</div>

            <input type="number" id="p${i}" placeholder="Peso">

            <div class="grp">
                <button onclick="dec(${i})">-</button>
                <input type="number" id="q${i}" value="0">
                <button onclick="inc(${i})">+</button>
            </div>
        </div>
    `).join('');
}

function inc(i){
    const el = document.getElementById('q'+i);
    el.value = Number(el.value||0)+1;
}

function dec(i){
    const el = document.getElementById('q'+i);
    el.value = Math.max(0,Number(el.value||0)-1);
}

function coletar(){
    let arr=[];
    CLASSES.forEach((c,i)=>{
        const peso = Number(document.getElementById('p'+i).value||0);
        const quebra = Number(document.getElementById('q'+i).value||0);

        if(peso>0){
            arr.push({classe:c,peso,quebra});
        }
    });
    return arr;
}

async function salvar(){
    const detalhes = coletar();

    const res = await fetch('/api/salvar-entrada',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            produtor_id: 1,
            tipo_alho: document.getElementById('tipo_alho').value,
            local: "Banca",
            local_origem: "Classificação",
            detalhes
        })
    });

    const d = await res.json();
    alert(d.mensagem);
}

render();
</script>

</body>
</html>
